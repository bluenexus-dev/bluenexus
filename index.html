<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic 8-Ball</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #1e1e1e, #0f0f0f);
    color: white;
    overflow: hidden;
  }

  h1 {
    margin-bottom: 30px;
    font-size: 2.5em;
    text-align: center;
  }

  .ball-container {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #000 0%, #111 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: relative;
    box-shadow: 0 0 30px #00f;
    transition: transform 0.2s;
  }

  .ball-container:active {
    transform: scale(0.95);
  }

  .answer {
    position: absolute;
    font-size: 1.1em;
    text-align: center;
    padding: 10px;
    opacity: 0;
    transition: opacity 0.5s, transform 0.5s;
  }

  .answer.show {
    opacity: 1;
    transform: translateY(-20px);
  }

  .shake {
    animation: shake 0.5s;
  }

  @keyframes shake {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(20deg); }
    40% { transform: rotate(-20deg); }
    60% { transform: rotate(15deg); }
    80% { transform: rotate(-10deg); }
    100% { transform: rotate(0deg); }
  }
</style>
</head>
<body>

<h1>Magic 8-Ball</h1>
<div class="ball-container" id="ball">
  <div class="answer" id="answer"></div>
</div>

<script>
  const ball = document.getElementById('ball');
  const answer = document.getElementById('answer');

  const responses = [
    "Yes, definitely!",
    "No way!",
    "Maybe…",
    "Ask again later",
    "Absolutely!",
    "I don’t think so",
    "Certainly",
    "Very doubtful",
    "It is certain",
    "Better not tell you now"
  ];

  ball.addEventListener('click', () => {
    // Shake animation
    ball.classList.add('shake');
    answer.classList.remove('show');

    setTimeout(() => {
      // Remove shake
      ball.classList.remove('shake');

      // Pick random response
      const random = responses[Math.floor(Math.random() * responses.length)];
      answer.textContent = random;
      answer.classList.add('show');
    }, 500);
  });
</script>

</body>
</html>
